                    <p>The TCP/IP model is a framework that sets the rules for how computers communicate over the Internet. It is organized into four layers:</p>

[Image of TCP/IP Model Layers]
`,
                long: `
                    <p>The TCP/IP (Transmission Control Protocol / Internet Protocol) model is a key framework that sets the rules for how computers communicate over the Internet and other networks. It makes sure that data sent from one device reaches another accurately, efficiently, and reliably, no matter what kind of hardware or software is being used. Essentially, it provides a common "language" that allows different systems to understand each other, covering everything from how data is formatted and transmitted to how it's routed and received. The model is organized into four layers, with each layer handling specific tasks in the communication process. These layers talk to the ones directly above and below them, keeping data moving smoothly and in order. This layered design makes the TCP/IP model flexible, scalable, and easier to troubleshoot since problems can often be traced to a particular layer. In short, the TCP/IP model is the backbone of modern networking and underpins many of the protocols we use every day, such as HTTP, FTP, and SMTP.</p>
                    

[Image of TCP/IP Model Layers]

                    <h3>Layers of TCP/IP Model:</h3>
                    <ul>
                        <li><strong>1. Application Layer:</strong> The topmost layer. It is the interface between the user (or application software) and the network. This layer allows applications to communicate over the network by providing services like file transfer, email, and web browsing. Essentially, it's where users interact with the network without worrying about how the data actually travels.<br><em>Examples: HTTP (loading websites), FTP (transferring files), SMTP (sending emails), DNS (translating website names).</em></li>
                        <li><strong>2. Transport Layer:</strong> Responsible for reliable data transfer between devices. It ensures that data is delivered correctly, in order, and without errors. It can establish a connection before sending data or send it quickly without establishing a connection. Handles error detection and flow control.<br><em>Examples: TCP (provides reliable, connection-oriented communication), UDP (provides faster, connectionless communication like live streaming).</em></li>
                        <li><strong>3. Internet Layer:</strong> Deals with logical addressing and routing. It is responsible for sending data packets from the source device to the destination device, even if they are on different networks. This layer decides the best path for data to travel across complex networks.<br><em>Examples: IP (Assigns addresses and routes packets), ICMP (Diagnostic tools like ping), ARP (Converts IP to MAC addresses).</em></li>
                        <li><strong>4. Network Access (Link) Layer:</strong> Manages how data is physically transmitted over the network medium. It deals with hardware addresses (MAC addresses), and it ensures devices can actually access the network, whether wired or wireless.<br><em>Examples: Ethernet (wired LANs), Wi-Fi (wireless), PPP (direct connections).</em></li>
                    </ul>`

                    <p>Attack targets on the Internet are the systems, services, or users that cyber attackers intentionally select to carry out harmful activities. These targets can include websites, servers, networks, user devices, online accounts, cloud services, and smart devices connected to the Internet. Attackers mainly focus on such targets to steal sensitive information, such as personal details, banking information, or important business data. In many situations, the goal of an attack is to interrupt normal operations by crashing servers, slowing down networks, or making online services unavailable. Such attacks can lead to financial losses and harm an organization's reputation. Cyber attackers may also try to gain unauthorized access to systems in order to install malware, alter data, or use the hacked system for future attacks. Attack targets are often chosen because of weak security, valuable data, or easy access. Hence, understanding these targets helps individuals and organizations improve security and better protect their digital assets on the Internet.</p>

                medium: `
                    <p>Authentication verifies the identity of the person logging in. It checks passwords, PINs, or fingerprints before granting access to protect data from unauthorized users.</p>

                    <ul>
                        <li><strong>Password-Based:</strong> Proving identity using something memorized. <em>Example: Email ID and password.</em></li>
                        <li><strong>Two-Factor (2FA):</strong> Requires two forms of verification. <em>Example: Password + mobile OTP.</em></li>
                        <li><strong>Biometric:</strong> Uses physical characteristics. <em>Example: Fingerprint or Face ID to unlock a phone.</em></li>

                        <li><strong>Certificate-Based:</strong> Uses digital certificates. <em>Example: SSL/TLS for secure websites.</em></li>
                        <li><strong>Multi-Factor (MFA):</strong> Layers two or more factors. <em>Example: Bank login using password, OTP, and fingerprint.</em></li>
                    </ul>`,
                long: `
                    <p>Authentication is a way to make sure that the person trying to log in is really who they claim to be. Before giving access to a system, device, or online account, it checks details like a password, PIN, fingerprint, or a one-time code. This process helps protect personal data, emails, and financial information from unauthorized access. Authentication acts as the first layer of security and reduces the risk of cyberattacks. Strong authentication methods make it much harder for attackers to misuse user accounts. It also builds trust in digital systems by ensuring safe and secure access. Today, authentication is used in almost every online service we use daily. With increasing cyber threats, advanced methods like multi-factor authentication and biometric verification have become common to add extra layers of security. It also helps organizations monitor access and detect unusual activities quickly, keeping sensitive systems safer.</p>
                    <h3>Types of Authentication with Examples:</h3>
                    <ul>
                        <li><strong>1. Password-Based Authentication:</strong> This is the most common method where a user proves their identity using a username and password. It relies on something the user knows and is simple to use, but its security depends on creating strong and unique passwords.<br><em>Example: Logging into an email account using a user ID and password.</em></li>
                        <li><strong>2. Two-Factor Authentication (2FA):</strong> This method requires two different forms of verification, usually combining something the user knows (like a password) and something the user has (like a mobile device). It adds an extra layer of security.<br><em>Example: Entering a password along with an OTP sent to the user's mobile phone.</em></li>
                        <li><strong>3. Biometric Authentication:</strong> This method uses unique physical or behavioral characteristics of a user, such as fingerprints, facial features, or voice patterns. Biometric authentication is difficult to forge.<br><em>Example: Using a fingerprint or face recognition to unlock a smartphone.</em></li>
                        <li><strong>4. Token-Based Authentication:</strong> In this method, a physical or digital token is used to verify identity. Tokens generate time-sensitive codes or act as access keys.<br><em>Example: Using a smart card or security token to access an office system.</em></li>
                        <li><strong>5. Certificate-Based Authentication:</strong> This method uses digital certificates issued by trusted authorities to confirm a user's identity. Certificates ensure that communication or access is secure.<br><em>Example: Accessing a secure website using an SSL/TLS certificate.</em></li>
                        <li><strong>6. Multi-Factor Authentication (MFA):</strong> MFA requires two or more authentication factors, combining anything the user knows, has, or is. This layered approach greatly reduces risk.<br><em>Example: Logging into a bank account using a password, OTP, and fingerprint.</em></li>
                    </ul>`

                    <p>Cloud services let people and businesses use computing resources like servers, storage, databases, networking, software, and analytics over the internet—without having to buy and maintain physical hardware. Think of it like renting tools instead of owning a full workshop: you use what you need and pay only for that. Cloud services make it easy to scale—adding more storage or computing power is just a few clicks away. They also make collaboration simple, since multiple users can access the same applications and data from anywhere in the world. On top of that, providers handle updates, maintenance, and security, so you can focus on your work without worrying about the technical backend.</p>
                    <h3>Different services of Cloud:</h3>
                    <ul>
                        <li><strong>1. IaaS (Infrastructure as a Service):</strong> IaaS provides virtualized computing resources over the internet, such as servers, storage, and networking. Users are responsible for managing the operating system, applications, and data, while the cloud provider handles the physical hardware and infrastructure. This model is flexible and cost-effective.<br><em>Example: Amazon Web Services (AWS EC2), Microsoft Azure Virtual Machines, Google Compute Engine.</em></li>
                        <li><strong>2. PaaS (Platform as a Service):</strong> PaaS offers a complete platform for developing, testing, and deploying applications without worrying about the underlying hardware or operating systems. It includes tools, libraries, and services that simplify coding and app management.<br><em>Example: Google App Engine, Microsoft Azure App Service, Heroku.</em></li>
                        <li><strong>3. SaaS (Software as a Service):</strong> SaaS delivers ready-to-use software applications over the internet, accessible via a web browser. Users don't have to install, manage, or maintain the software or infrastructure it's all handled by the provider. This is convenient for everyday tools.<br><em>Example: Gmail, Microsoft 365, Dropbox, Salesforce.</em></li>
                    </ul>`
            }
        },
        {
            title: "Q7. Describe and classify authorisation with types and example.",
            content: {
                short: `
                    <p>Authorization decides what a logged-in user is allowed to do within a system.</p>
                    <h3>Types:</h3>
                    <ul>
                        <li><strong>RBAC:</strong> Based on job role (e.g., Admin vs Employee).</li>
                        <li><strong>ABAC:</strong> Based on smart attributes (e.g., Dept, Time).</li>
                        <li><strong>PBAC:</strong> Based on admin policies.</li>
                        <li><strong>MAC:</strong> Strict clearance levels (e.g., Military Top Secret).</li>
                        <li><strong>DAC:</strong> The file owner decides access.</li>
                        <li><strong>Rule-Based:</strong> Based on specific rules like IP/Time.</li>
                    </ul>`,
                medium: `
                    <p>While authentication answers "Who are you?", authorization answers "What are you allowed to do?" It controls permissions and access to keep sensitive information safe.</p>
                    <h3>Types of Authorization:</h3>
                    <ul>
                        <li><strong>Role-Based (RBAC):</strong> Access is based on the user's job role. <em>Example: An Admin edits data, an Employee only views it.</em></li>
                        <li><strong>Attribute-Based (ABAC):</strong> Access depends on factors like time, location, or department. <em>Example: Only accessible during office hours.</em></li>
                        <li><strong>Policy-Based (PBAC):</strong> Decided by admin rules. <em>Example: Only EU employees can access EU servers.</em></li>
                        <li><strong>Mandatory (MAC):</strong> Very strict, based on security clearance. <em>Example: Military "Top Secret" documents.</em></li>
                        <li><strong>Discretionary (DAC):</strong> The file owner chooses who gets access. <em>Example: Sharing a Google Doc.</em></li>
                        <li><strong>Rule-Based:</strong> Access controlled by specific network rules. <em>Example: Logins only allowed between 9 AM and 5 PM.</em></li>
                    </ul>`,
                long: `
                    <p>Authorization is all about deciding what a user can and cannot do after the system knows who they are. While authentication answers "Who are you?", authorization answers "What are you allowed to do?". It controls the permissions and access a user has within a system. For example, in a banking app, logging in proves you are the account holder (authentication), but authorization decides whether you can just check your balance, transfer money, or close your account. In a company's HR system, it determines whether an employee can edit records, approve leave, or just view their own profile. Authorization is really important because it keeps sensitive information safe and makes sure people only access what they're supposed to. Without it, even trusted users could accidentally or intentionally get into areas they shouldn't, causing data leaks or other problems.</p>
                    <h3>Types of Authorization:</h3>
                    <ul>
                        <li><strong>1. Role-Based Authorization (RBAC):</strong> Users are assigned roles, and each role determines what actions they can perform. Access is strictly based on the user's role.<br><em>Example: Admin -> Can add/remove users. Manager -> Can view/edit reports. Employee -> Can only view their own data.</em></li>
                        <li><strong>2. Attribute-Based Authorization (ABAC):</strong> Access depends on multiple factors such as user attributes, resource attributes, and environmental conditions like time or location. This allows dynamic and flexible control.<br><em>Example: A document accessed only if the user is in Finance, classification is internal, and it is during work hours.</em></li>
                        <li><strong>3. Policy-Based Authorization (PBAC):</strong> Access is determined by rules or policies defined by administrators. These policies consider various conditions.<br><em>Example: A policy granting access only if "Employees in Europe can access EU server data only".</em></li>
                        <li><strong>4. Mandatory Access Control (MAC):</strong> Access is enforced based on sensitivity labels of both users and resources. Users cannot change permissions, ensuring high security.<br><em>Example: Military system where a user with "Secret" clearance is denied access to a "Top Secret" document.</em></li>
                        <li><strong>5. Discretionary Access Control (DAC):</strong> The owner of a resource decides who can access it and what actions they can perform.<br><em>Example: A file owner sharing a Google Drive file and giving read/write permissions to specific colleagues.</em></li>
                        <li><strong>6. Rule-Based Authorization:</strong> Access is controlled by predefined rules rather than roles or attributes. Rules can include time, location, or network restrictions.<br><em>Example: Users can log in only between 9 AM and 5 PM, or access is blocked from restricted IP addresses.</em></li>
                    </ul>`
            }
        }
    ];
