                    <h3>What is the TCP/IP Model?</h3>
                    <p>The TCP/IP (Transmission Control Protocol / Internet Protocol) model is the foundational framework that sets the strict rules for how computers communicate over the Internet. It ensures that data sent from one device reaches another completely accurately.</p>
                    <h3>The 4 Layers of the Model</h3>
                    <p>The process of sending data is divided into four specific layers:</p>

                    <h3>Introduction to the TCP/IP Model</h3>
                    <p>The TCP/IP (Transmission Control Protocol / Internet Protocol) model is the absolute backbone of modern global networking. It is a vital framework that establishes the strict, universal rules for exactly how computers and devices communicate over the Internet. It ensures that a picture sent from a mobile phone in India reaches a laptop in America accurately, efficiently, and reliably. It acts as a common, standard "language" for all computers regardless of their brand.</p>
                    
                    <h3>The 4 Layers of the TCP/IP Model</h3>
                    <p>The model simplifies complex network communication by neatly organizing it into four stacked layers, with each layer handling highly specific tasks:</p>
                    <ul>
                        <li><strong>1. Application Layer:</strong> This is the highest layer and the only one the user interacts with. It provides the necessary interfaces and protocols that allow user software applications to access the network. It handles tasks like file transfer, email sending, and web browsing. 
                            <br><em>Examples: HTTP/HTTPS (for loading secure websites), SMTP (for sending emails), and FTP (for uploading files).</em></li>
                        <li><strong>2. Transport Layer:</strong> This crucial layer is directly responsible for reliable, error-free data transfer between two devices. It takes large files from the Application layer and chops them into smaller "segments." It ensures that data is delivered completely correctly, in the exact original order, and without any lost pieces.
                            <br><em>Examples: TCP (Transmission Control Protocol, which heavily checks for errors to ensure perfect delivery) and UDP (User Datagram Protocol, used for very fast, connectionless communication like live gaming or video calls where speed matters more than perfect accuracy).</em></li>
                        <li><strong>3. Internet Layer:</strong> This layer acts like a global post office. It deals with logical IP addressing and routing. It is responsible for attaching the sender's and receiver's IP addresses to the data packets. It then figures out the absolute best, fastest path to send those packets across highly complex global networks.
                            <br><em>Examples: IPv4 and IPv6 (Internet Protocols that give every device a unique address).</em></li>
                        <li><strong>4. Network Access (Link) Layer:</strong> This is the lowest, most physical layer. It manages exactly how digital data is physically transmitted over the actual hardware medium. It converts digital 1s and 0s into electrical signals or radio waves and deals with hardware MAC addresses.
                            <br><em>Examples: Ethernet (for wired LAN cables) and Wi-Fi (for wireless connections).</em></li>
                    </ul>
                    
                    <h3>Conclusion</h3>
                    <p>By dividing the incredibly complex task of internet communication into four manageable layers, the TCP/IP model allows different hardware and software to work together flawlessly around the world.</p>`
            }
        },

                                <tr><td><strong>1. Definition & Source</strong></td><td>A DOS attack is launched from a <em>single</em> attacking computer and a single internet connection. The solo attacker sends excessive requests to slow down the target.</td><td>A DDOS attack is launched from <em>multiple</em> computers or devices simultaneously. Attackers use a "botnet" (a massive global army of hacked, infected devices) to combine their traffic.</td></tr>
                                <tr><td><strong>2. Speed and Volume</strong></td><td>The volume of traffic is very low because a single computer and one Wi-Fi router can only generate so much traffic at once.</td><td>The volume of traffic is terrifyingly high. The combined power of a million hacked devices sends a tsunami of data that instantly crushes the target server.</td></tr>
                                <tr><td><strong>3. Impact and Danger Level</strong></td><td>The impact is limited. It usually only affects small, poorly defended target servers (like a local bakery website). Giant servers easily absorb a DOS attack.</td><td>The impact is absolutely massive and catastrophic. The combined power of a botnet can easily overwhelm and destroy the servers of giant global companies and even governments.</td></tr>
                                <tr><td><strong>4. Detection and Defense</strong></td><td>It is extremely easy to detect and stop. The firewall simply sees that too much traffic is coming from one single IP address, and permanently blocks that one IP.</td><td>It is extremely hard to detect and block. Because the attacking traffic is coming from hundreds of thousands of completely different, innocent-looking sources all over the world, the firewall gets confused.</td></tr>
                                <tr><td><strong>5. Real-World Example</strong></td><td><strong>Example:</strong> A basic "Ping of Death" or "Buffer Overflow" attack launched against a small school website directly from one angry student's laptop in his bedroom.</td><td><strong>Example:</strong> The devastating Mirai Botnet attack in 2016, which successfully hacked thousands of smart cameras worldwide and forced them to simultaneously attack and take down giant companies like Twitter, Netflix, and Reddit.</td></tr>
                            </tbody>
                        </table>
                    </div>
                    
                    <h3>Conclusion</h3>
                    <p>While a DOS attack is like one person trying to block a door, a DDOS attack is like a massive crowd of ten thousand people crushing the door down at the same time. DDOS is vastly more dangerous.</p>`

                long: `
                    <h3>Introduction</h3>
                    <p>In network security, finding a hacker is only half the battle. You also need to stop them. This is where the crucial difference between an IDS (Intrusion Detection System) and an IPS (Intrusion Prevention System) comes into play. Both are critical tools, but they react to cyber threats in fundamentally different ways.</p>
                    
                    <h3>Detailed Difference Between IDS and IPS</h3>
                    <div class="table-wrapper">
                        <table class="diff-table">
                            <thead><tr><th>Point of Difference</th><th>IDS (Intrusion Detection System)</th><th>IPS (Intrusion Prevention System)</th></tr></thead>

                                <tr><td><strong>2. Response Time</strong></td><td>The response time is terribly slow because it entirely depends on a human IT administrator to wake up, read the alert on their screen, and manually block the hacker.</td><td>The response time is completely instant. It stops the aggressive attack in real-time automatically without ever waiting for human approval.</td></tr>
                                <tr><td><strong>3. Placement in Network</strong></td><td>It usually sits safely "out-of-band" (off to the side of the network), secretly monitoring a copy of the traffic without physically touching the main data flow.</td><td>It is placed directly "in-line" (in the exact main traffic path). All internet data must physically flow through the IPS before entering the company.</td></tr>
                                <tr><td><strong>4. Risk of False Positives</strong></td><td>It is perfectly safe. If it makes a mistake and flags a normal user as a hacker, it only sends a false alarm. It won't accidentally disturb normal business traffic.</td><td>It is highly risky. Because it actively blocks traffic, a badly configured IPS can accidentally block legitimate, normal customers from accessing the company network, ruining business.</td></tr>
                                <tr><td><strong>5. Real-World Example</strong></td><td><strong>Example:</strong> Using Snort software in strictly detection mode—it only sends an urgent email alert to the IT team when it spots unusual network activity from Russia.</td><td><strong>Example:</strong> Using Snort software in strict prevention mode—it instantly and automatically drops the connection and blocks the Russian IP address the second it looks suspicious.</td></tr>
                            </tbody>

                    <h3>Conclusion</h3>
                    <p>To ensure maximum safety, modern companies use both: an IDS to gather deep intelligence and log alarms, and an IPS to act as the primary shield that violently blocks incoming attacks.</p>`

            content: {
                short: `
                    <h3>Definition</h3>
                    <p>Authorization is the security step that decides what a user is allowed to do inside a system <em>after</em> they successfully log in.</p>
                    <h3>Types of Authorization</h3>
                    <ul>
                        <li><strong>Role-Based (RBAC):</strong> Access depends purely on your job title (Admin vs Employee).</li>
                        <li><strong>Mandatory (MAC):</strong> Ultra-strict access based on secret clearance (Used in Military).</li>
                        <li><strong>Discretionary (DAC):</strong> The file creator decides who gets to open it.</li>
                    </ul>`,
                medium: `
                    <h3>What is Authorization?</h3>
                    <p>While authentication answers "Who are you?", authorization firmly answers "What are you allowed to do?" It strictly controls the permissions a user has. Logging in proves you are the account holder, but authorization decides if you can only view the balance or actually transfer money.</p>
                    <h3>Types of Authorization</h3>
                    <ul>
                        <li><strong>Role-Based Access Control (RBAC):</strong> Access is based solely on the user's official job role. <em>Example: An IT Admin can delete company data, but a normal Employee can only view their own data.</em></li>
                        <li><strong>Attribute-Based Access Control (ABAC):</strong> Access depends on smart conditions like time or GPS location. <em>Example: A confidential file can only be opened during normal office hours.</em></li>
                        <li><strong>Mandatory Access Control (MAC):</strong> Ultra-strict access based on hard-coded security labels. Users cannot change permissions. <em>Example: A military document labeled 'Top Secret' can only be opened by generals.</em></li>
                        <li><strong>Discretionary Access Control (DAC):</strong> The creator or owner of a file decides exactly who can open it. <em>Example: Sharing a Google Doc and personally giving specific friends 'read' access.</em></li>
                    </ul>`,
                long: `
                    <h3>Definition of Authorization</h3>
                    <p>Authorization is the critical security process of deciding exactly what a user can and cannot do <em>after</em> the system knows who they are. While authentication perfectly answers the question "Who are you?", authorization firmly answers "What are you allowed to do?". It is incredibly important because it keeps highly sensitive information safe and ensures people only access the exact files they are legally supposed to see.</p>
                    
                    <h3>Classification / Types of Authorization</h3>
                    <p>Modern computer systems use different advanced models to grant permissions based on their specific security needs:</p>
                    <ul>
                        <li><strong>1. Role-Based Access Control (RBAC):</strong> This is the most common method in business. Users are officially assigned specific job roles, and each role determines what actions they can perform. Access is strictly based on the job title, not the person. 
                            <br><em>Example: In an HR office app, the 'Manager' role can add or fire users, but the 'Basic Employee' role can only view their own personal profile and nothing else.</em></li>
                        <li><strong>2. Attribute-Based Access Control (ABAC):</strong> This is highly dynamic and smart. Access depends on evaluating multiple real-time factors or 'attributes' such as the user's department, the time of day, or their current GPS location. 
                            <br><em>Example: A hospital patient document can only be accessed if the user is a verified doctor AND it is currently normal working hours AND they are physically inside the hospital building.</em></li>
                        <li><strong>3. Mandatory Access Control (MAC):</strong> This is the absolute strictest form of security, designed by the government. Access is enforced based on hard-coded sensitivity labels. Even the owner of the document cannot casually change permissions. 
                            <br><em>Example: Heavily used in the military. If a defense document is officially classified as "Top Secret", a young soldier with only "Secret" clearance will be instantly and permanently denied access.</em></li>
                        <li><strong>4. Discretionary Access Control (DAC):</strong> This is the most flexible and common personal form. The original owner or creator of a file or resource has full, absolute discretion to decide exactly who can access it and what actions they can perform. 
                            <br><em>Example: A college student creating a project folder on a shared Google Drive and personally choosing to give "read/write" permissions to two specific classmates, while blocking everyone else.</em></li>
                    </ul>
                    
                    <h3>Conclusion</h3>
                    <p>Without strict authorization, anyone who simply logs into a company network would have the terrifying power to delete the entire database. Authorization provides the necessary borders and walls inside a system.</p>`
            }
        }
