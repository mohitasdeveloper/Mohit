                    <h3>Meaning</h3>

                    <ol>
                        <li><strong>Set Company Goals:</strong> Top management decides the ultimate goals for the entire organization.</li>

                        <li><strong>Final Appraisal:</strong> Rewarding the employee based on actual results achieved.</li>
                    </ol>`,
                long: `
                    <h3>Meaning of Management by Objectives (MBO)</h3>
                    <p>Introduced by management expert Peter Drucker, <strong>${defMBO}</strong> Instead of bosses blindly giving top-down orders, MBO is a friendly, collaborative process. The manager and employee negotiate the targets together, and the employee is judged purely on whether they hit those exact targets.</p>
                    
                    <h3>The Step-by-Step MBO Process</h3>
                    <p>Implementing MBO successfully in a company requires following a strict, logical cycle:</p>
                    <ul>
                        <li><strong>Step 1: Setting Broad Organizational Goals:</strong> The process begins at the absolute highest level. The CEO and Board of Directors deeply analyze the market and establish clear, strategic goals for the entire organization. <em>(Example: "Achieve 30% growth in global sales this year").</em></li>
                        <li><strong>Step 2: Setting Departmental Goals:</strong> The massive company goals are divided and passed down. The Marketing Head sets goals for their team to run ads, while the Production Head sets output targets for the factory.</li>
                        <li><strong>Step 3: Joint Setting of Individual Objectives (The Core Step):</strong> This is the beating heart of MBO. A manager sits down with each employee individually. Instead of giving orders, they negotiate and jointly agree on specific, measurable, and realistic targets for that worker. Because the worker helped set the goal, they work much harder to achieve it.</li>
                        <li><strong>Step 4: Developing the Action Plan:</strong> Goals are useless without a roadmap. The employee creates a detailed, step-by-step action plan outlining exactly how they will hit their targets, while the manager promises to provide the necessary budget and tools.</li>
                        <li><strong>Step 5: Periodic Performance Reviews:</strong> MBO requires constant tracking. Every quarter (3 months), the manager and employee meet to track progress. If the employee is falling behind, the manager provides immediate training and help to fix the issue.</li>
                        <li><strong>Step 6: Final Performance Appraisal and Reward:</strong> At the end of the year, a final review happens. The employee's actual performance is strictly measured against the goals set in Step 3. If they succeeded, they are heavily rewarded with promotions or bonuses. If they failed, the reasons are discussed to improve next year.</li>
                    </ul>
                    
                    <h3>Conclusion</h3>
                    <p>MBO is a highly effective system because it removes confusion. Every employee knows exactly what they need to do to get a bonus, leading to massive company growth.</p>`

                    <p>Communication often fails because of obstacles called "barriers". The main types are:</p>
                    <ul>
                        <li><strong>Language (Semantic) Barriers:</strong> Using highly technical words (jargon) that the listener doesn't understand, or poor translation between languages.</li>
                        <li><strong>Psychological Barriers:</strong> If the receiver is angry, stressed, or prejudiced, their brain will block or twist the meaning of the message.</li>
                        <li><strong>Physical Barriers:</strong> Loud background noise in a factory, bad phone signals, or broken internet connections.</li>
                        <li><strong>Organizational Barriers:</strong> Strict company rules or too many layers of management can cause messages to get delayed or filtered out.</li>
                    </ul>`,
                long: `
                    <h3>Introduction</h3>
                    <p><strong>${defCommunication}</strong> However, communication is only effective when the receiver perfectly understands what the sender intended. In reality, messages are often distorted, misunderstood, or totally lost due to various obstacles known as "barriers."</p>
                    
                    <h3>Main Barriers to Effective Communication</h3>
                    <p>These barriers can be classified into four main categories:</p>
                    <ul>
                        <li><strong>1. Semantic (Language) Barriers:</strong> This occurs when the sender and receiver interpret words differently. 
                            <br>- <em>Technical Jargon:</em> An IT expert using complex computer terms with a normal sales employee causes massive confusion.
                            <br>- <em>Faulty Translation:</em> Using the wrong words or bad grammar totally changes the intended meaning of an official email.
                        </li>
                        <li><strong>2. Psychological (Emotional) Barriers:</strong> The human mind filters information based on emotions.
                            <br>- <em>Premature Evaluation:</em> The listener jumps to conclusions and stops listening before the speaker has even finished.
                            <br>- <em>Emotions:</em> If an employee is in deep anger or fear, they physically cannot absorb logical instructions given by the manager.
                            <br>- <em>Lack of Trust:</em> If the staff dislikes the boss, they will view all his messages with extreme suspicion and doubt.

                        <li><strong>3. Physical and Environmental Barriers:</strong> These are real-world, physical obstacles. Loud noise on a factory floor, poor office lighting, terrible cellular networks, a faulty microphone during a Zoom call, or vast geographical distance between global offices can severely damage the message.</li>
                        <li><strong>4. Organizational Barriers:</strong> The structure of the company itself can ruin communication.

            title: "22. What are steps involved in MBO process.",
            content: {
                short: `
                    <h3>Definition</h3>
                    <p>${defMBO}</p>
                    <h3>Process</h3>
                    <p>1. Set Company Goals -> 2. Set Department Goals -> 3. Jointly set Employee Goals -> 4. Review Progress -> 5. Final Reward.</p>`,
                medium: `
                    <h3>Meaning of MBO</h3>
                    <p>${defMBO}</p>
                    <h3>The MBO Process</h3>
                    <ol>
                        <li><strong>Set Company Goals:</strong> Top management decides the ultimate goals for the entire organization.</li>
                        <li><strong>Set Individual Objectives:</strong> Managers and subordinates jointly agree on specific, achievable targets for each worker.</li>
                        <li><strong>Action Plan:</strong> Creating a step-by-step plan on how the employee will hit those targets.</li>
                        <li><strong>Performance Review:</strong> Regularly checking if the employee is succeeding or failing.</li>
                        <li><strong>Final Appraisal:</strong> Rewarding the employee based on actual results achieved.</li>
                    </ol>`,
                long: `
                    <h3>Meaning of Management by Objectives (MBO)</h3>
                    <p>Introduced by management expert Peter Drucker, <strong>${defMBO}</strong> Instead of bosses blindly giving top-down orders, MBO is a friendly, collaborative process. The manager and employee negotiate the targets together, and the employee is judged purely on whether they hit those exact targets.</p>
                    
                    <h3>The Step-by-Step MBO Process</h3>
                    <p>Implementing MBO successfully in a company requires following a strict, logical cycle:</p>
                    <ul>
                        <li><strong>Step 1: Setting Broad Organizational Goals:</strong> The process begins at the absolute highest level. The CEO and Board of Directors deeply analyze the market and establish clear, strategic goals for the entire organization. <em>(Example: "Achieve 30% growth in global sales this year").</em></li>
                        <li><strong>Step 2: Setting Departmental Goals:</strong> The massive company goals are divided and passed down. The Marketing Head sets goals for their team to run ads, while the Production Head sets output targets for the factory.</li>
                        <li><strong>Step 3: Joint Setting of Individual Objectives (The Core Step):</strong> This is the beating heart of MBO. A manager sits down with each employee individually. Instead of giving orders, they negotiate and jointly agree on specific, measurable, and realistic targets for that worker. Because the worker helped set the goal, they work much harder to achieve it.</li>
                        <li><strong>Step 4: Developing the Action Plan:</strong> Goals are useless without a roadmap. The employee creates a detailed, step-by-step action plan outlining exactly how they will hit their targets, while the manager promises to provide the necessary budget and tools.</li>
                        <li><strong>Step 5: Periodic Performance Reviews:</strong> MBO requires constant tracking. Every quarter (3 months), the manager and employee meet to track progress. If the employee is falling behind, the manager provides immediate training and help to fix the issue.</li>
                        <li><strong>Step 6: Final Performance Appraisal and Reward:</strong> At the end of the year, a final review happens. The employee's actual performance is strictly measured against the goals set in Step 3. If they succeeded, they are heavily rewarded with promotions or bonuses. If they failed, the reasons are discussed to improve next year.</li>
                    </ul>
                    
                    <h3>Conclusion</h3>
                    <p>MBO is a highly effective system because it removes confusion. Every employee knows exactly what they need to do to get a bonus, leading to massive company growth.</p>`
